version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: medicare_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medicare_plus

  backend:
    build: ./backend
    container_name: medicare_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/medicare_plus
      - JWT_SECRET=medicare_plus_jwt_secret_2024_enterprise_secure
      - JWT_REFRESH_SECRET=medicare_plus_refresh_2024_very_secure
      - JWT_EXPIRES_IN=2h
      - NODE_ENV=production
    depends_on:
      - mongodb
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: medicare_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: medicare_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
