name: MediCare+ CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_BACKEND: medicare-backend
  IMAGE_FRONTEND: medicare-frontend
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: npm ci
      - name: Run unit tests
        run: npm test
        env:
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          ENCRYPTION_KEY: test_encryption_key
          RAZORPAY_KEY_SECRET: test_razorpay_secret
          NODE_ENV: test

  # ─── Lint & Build Frontend ──────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Build React app
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: /api

  # ─── Docker Build & Push to ECR ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        run: |
          docker build -t $ECR_REGISTRY/$IMAGE_BACKEND:${{ github.sha }} ./backend
          docker tag $ECR_REGISTRY/$IMAGE_BACKEND:${{ github.sha }} $ECR_REGISTRY/$IMAGE_BACKEND:latest
          docker push $ECR_REGISTRY/$IMAGE_BACKEND:${{ github.sha }}
          docker push $ECR_REGISTRY/$IMAGE_BACKEND:latest

      - name: Build & push frontend image
        run: |
          docker build -t $ECR_REGISTRY/$IMAGE_FRONTEND:${{ github.sha }} ./frontend
          docker tag $ECR_REGISTRY/$IMAGE_FRONTEND:${{ github.sha }} $ECR_REGISTRY/$IMAGE_FRONTEND:latest
          docker push $ECR_REGISTRY/$IMAGE_FRONTEND:${{ github.sha }}
          docker push $ECR_REGISTRY/$IMAGE_FRONTEND:latest

  # ─── Deploy to AWS ECS ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download ECS task definition (backend)
        run: |
          aws ecs describe-task-definition \
            --task-definition medicare-backend \
            --query taskDefinition \
            > task-definition-backend.json

      - name: Fill in new image for backend task def
        id: task-def-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-backend.json
          container-name: medicare-backend
          image: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
          service: medicare-backend-service
          cluster: medicare-cluster
          wait-for-service-stability: true

      - name: Notify on success
        if: success()
        run: echo "✅ MediCare+ deployed successfully to AWS ECS at $(date)"
